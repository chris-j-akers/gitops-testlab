apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alloy-config
  namespace: grafana-alloy
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    local.file_match "system" {
      path_targets = [{
        __address__ = "localhost",
        __path__    = "/var/log/*log",
        job = "varlogs",
      }]
    }

    loki.source.file "system" {
      targets    = local.file_match.system.targets
      forward_to      = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://192.168.1.187:3100/loki/api/v1/push"
      }
      external_labels = {}
    }  

    prometheus.exporter.github "gitopsrepo" {
      api_token = env("GITHUB_API_TOKEN")
      repositories = ["chris-j-akers/gitops-testlab"]
    }

    prometheus.scrape "gitopsreposcrape" {
      targets = prometheus.exporter.github.gitopsrepo.targets
      forward_to [prometheus.remote_write.gitopsrepo.receiver]

    }

    prometheus.remote_write "gitopsrepo" {
      endpoint {
        url = "http://192.168.1.187:9009/loki/api/v1/push"
      }
    }

    