apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: grafana-alloy
spec:
  interval: 5m
  chart:
    spec:
      chart:  alloy
      version: "1.8.2"
      sourceRef:
        kind: HelmRepository
        name: grafana-alloy
        namespace: flux-system
  values:
    alloy:
      clustering:
        enabled: true
      configMap:
        create: false
        name: grafana-alloy-config
      extraEnv:
        - name: GITHUB_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-api-token
              key: gitHubAPIToken
    controller:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    service:
      type: LoadBalancer

