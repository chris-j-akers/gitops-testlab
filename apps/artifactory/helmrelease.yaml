apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory-oss
  namespace: artifactory
spec:
  interval: 5m
  chart:
    spec:
      chart: artifactory-oss
      version: "107.39.4"
      sourceRef:
        kind: HelmRepository
        name: jfrog
        namespace: flux-system
  values:
    postgresql:
      postgresqlDatabase: artifactory
      postgresqlUsername: artifactory
      postgresqlPassword: artifactory123
      persistence:
        enabled: true
        size: 5Gi
        storageClass: local-path 
    artifactory:
      persistence:
        enabled: true
        size: 10Gi
        storageClass: local-path
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - cakers-worker-1.lab.local
