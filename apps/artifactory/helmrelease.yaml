apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory-oss
  namespace: artifactory
spec:
  interval: 5m
  chart:
    spec:
      chart: artifactory-oss
      version: "2.1.0"    # replace with an actual available version
      sourceRef:
        kind: HelmRepository
        name: jfrog
        namespace: flux-system
  values:
    artifactory:
      database:
        type: postgresql
        driver: org.postgresql.Driver
        host: postgres.database.svc.cluster.local
        port: 5432
        username: artifactory
        password: artifactory123
        database: artifactory
    postgresql:
      enabled: false        # we’re using our external Postgres instead
    persistence:
      enabled: true
      storageClass: ""
      size: 20Gi
      path: /mnt/artifactory_data
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - cakers-worker-1.lab.local