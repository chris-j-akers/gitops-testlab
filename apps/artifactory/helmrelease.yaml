apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory-oss
  namespace: artifactory
spec:
  interval: 5m
  chart:
    spec:
      chart: artifactory-oss
      version: "107.133.12"
      sourceRef:
        kind: HelmRepository
        name: jfrog
        namespace: flux-system
  values:
      persistence:
        size: 20Gi         # Must match your PV
        storageClass: ""    # Blank so it binds to your hostPath PV
