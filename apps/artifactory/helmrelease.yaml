apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory
  namespace: artifactory
spec:
  chart:
    spec:
      chart: artifactory
      version: 8.8.1
      sourceRef:
        kind: HelmRepository
        name: jfrog
        namespace: flux-system
  interval: 5m
  values:
    artifactory:
      database:
        type: postgresql
        driver: org.postgresql.Driver
        host: postgres.database.svc.cluster.local
        port: 5432
        username: artifactory
        password: artifactory123
        database: artifactory
    persistence:
      enabled: true
      storageClass: ""
      size: 20Gi
      path: /mnt/artifactory_data
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - cakers-worker-1.lab.local
