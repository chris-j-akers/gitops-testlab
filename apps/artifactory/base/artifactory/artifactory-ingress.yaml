apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: artifactory-ingress
  namespace: artifactory
  annotations:
    kubernetes.io/ingress.class: nginx
    # Remove rewrite entirely, just pass paths as-is
spec:
  rules:
    - host: artifactory.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: artifactory
                port:
                  number: 8081
