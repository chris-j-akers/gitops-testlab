apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory
  namespace: artifactory
spec:
  chart:
    spec:
      chart: artifactory
      version: 8.8.1
      sourceRef:
        kind: HelmRepository
        name: jfrog
        namespace: flux-system
  interval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: artifactory-values
      valuesKey: values.yaml
