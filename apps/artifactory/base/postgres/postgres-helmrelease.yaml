apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory-postgres
  namespace: artifactory
spec:
  interval: 1m
  chart:
    spec:
      chart: postgresql
      version: "15.3.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    primary:
      image:
        registry: docker.io
        repository: bitnami/postgresql
        tag: 15.3.0-debian-11-r0
      persistence:
        enabled: true
        size: 5Gi
        storageClass: ""   # blank for hostPath lab or default storage
    nodeSelector:
      kubernetes.io/hostname: cakers-worker-2.lab.local
    global:
      postgresql:
        postgresqlDatabase: artifactory
        postgresqlUsername: artifactory
        postgresqlPassword: password
