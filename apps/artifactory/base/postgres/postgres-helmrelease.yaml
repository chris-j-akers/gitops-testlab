apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: artifactory-postgres
  namespace: artifactory
spec:
  interval: 1m
  chart:
    spec:
      chart: postgresql
      version: "15.3.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: 16.3.0-debian-12-r4

    primary:
      persistence:
        enabled: true
        size: 5Gi
        storageClass: ""

    auth:
      database: artifactory
      username: artifactory
      password: password

    nodeSelector:
      kubernetes.io/hostname: cakers-worker-2.lab.local