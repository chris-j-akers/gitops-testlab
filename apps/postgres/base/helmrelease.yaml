apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: postgres
  namespace: database
spec:
  chart:
    spec:
      chart: postgresql
      version: 15.2.0
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  interval: 5m
  valuesFrom:
    - kind: ConfigMap
      name: postgres-values
      valuesKey: values.yaml
