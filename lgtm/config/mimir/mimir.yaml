# Single-binary mode: all Mimir components in one process.
# Suitable for a lab/single-node deployment.
target: all,alertmanager

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

# Ring configuration for single-instance (no hash ring peers needed).
ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

compactor:
  data_dir: /data/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

memberlist:
  join_members: []

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb
    retention_period: 168h

ruler:
  rule_path: /data/mimir/ruler-tmp

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

alertmanager:
  data_dir: /data/mimir/alertmanager
  fallback_config_file: /etc/mimir/alertmanager-fallback.yaml

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/alertmanager
